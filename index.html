<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheSuftSocials</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="brand">TheSuftSocials</div>

  <div class="header-icons">
    <button class="theme-btn">☼</button>
    <button class="menu-btn">☰</button>
  </div>
</header>

<section class="hero">

  <h1 class="hero-title">
    PREMIUM<br>
    <span>SOCIAL</span> ASSETS<br>
    DELIVERED<br>
    FAST
  </h1>

  <p class="hero-text">
    Buy aged social media accounts, working
    tools, virtual SMS numbers, and SME
    boosting services plus all in one platform,
    paid from your wallet.
  </p>

  <button class="primary-btn">
    GET STARTED →
  </button>

  <button class="secondary-btn">
    BROWSE SERVICES
  </button>

</section>
<section class="stats-section">

  <div class="stat-box">
    <h2>10K+</h2>
    <p>ACCOUNTS IN<br>STOCK</p>
  </div>

  <div class="stat-box">
    <h2>200+</h2>
    <p>COUNTRIES FOR<br>SMS</p>
  </div>

  <div class="stat-box">
    <h2>&lt;10s</h2>
    <p>AVG DELIVERY<br>TIME</p>
  </div>

  <div class="stat-box">
    <h2>24/7</h2>
    <p>PLATFORM<br>UPTIME</p>
  </div>

</section>
<script src="script.js"></script>

</body>
</html>
