<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - TheSuftSocials</title>

<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="container">

    <header class="topbar">
        <div class="menu">☰</div>

        <div class="profile" id="profileInitials">
            DD
        </div>
    </header>

    <h1 id="welcomeText">
        Welcome back 👋
    </h1>

    <p class="subtitle">
        Here's what's going on with your account
    </p>

    <div class="card">
        <p>Wallet balance</p>
        <h2 id="balance">₦0</h2>
        <span>View history →</span>
    </div>

    <div class="card">
        <p>Total purchases</p>
        <h2 id="purchases">0</h2>
        <span>View orders →</span>
    </div>

    <div class="card">
        <p>Available inventory</p>
        <h2 id="inventory">0</h2>
        <span id="inventoryDetails">
            0 logs • 0 tools
        </span>
    </div>

    <h3 class="section-title">
        Quick actions
    </h3>

    <div class="action-card" onclick="location.href='logs.html'">
        Buy Logs
    </div>

    <div class="action-card" onclick="location.href='tools.html'">
        Buy Tools
    </div>

    <div class="action-card" onclick="location.href='wallet.html'">
        Top Up Wallet
    </div>

    <div class="action-card" onclick="location.href='support.html'">
        Get Support
    </div>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
